  <title>Trending – ViewTube</title>
  <style>
    .trending-hero {
      background: linear-gradient(135deg, rgba(255,90,124,0.15), rgba(124,90,255,0.1));
      border: 1px solid rgba(255,90,124,0.2);
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .trending-hero-icon {
      font-size: 48px;
      line-height: 1;
    }
    .trending-hero-title {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(90deg, #ff5a7c, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .trending-hero-sub { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
    
    .trending-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .trending-tabs::-webkit-scrollbar { display: none; }
    
    .trend-tab {
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .trend-tab:hover { border-color: var(--accent-2); color: var(--accent-2); }
    .trend-tab.active {
      background: linear-gradient(135deg, var(--accent-2), #ff8c00);
      color: white;
      border-color: transparent;
      box-shadow: 0 0 16px var(--accent-2-glow);
    }
    
    /* Trending List View */
    .trending-list { display: flex; flex-direction: column; gap: 0; }
    
    .trending-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background var(--transition);
      border-bottom: 1px solid var(--border-subtle);
    }
    .trending-item:hover { background: var(--bg-hover); }
    .trending-item:last-child { border-bottom: none; }
    
    .rank-num {
      font-size: 28px;
      font-weight: 900;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      min-width: 40px;
      text-align: center;
      letter-spacing: -2px;
    }
    .rank-num.top3 {
      background: linear-gradient(135deg, var(--accent-2), #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .trending-thumb {
      width: 180px;
      aspect-ratio: 16/9;
      border-radius: var(--radius-sm);
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
      background: var(--bg-card);
    }
    .trending-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .trending-duration {
      position: absolute;
      bottom: 4px; right: 4px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      padding: 1px 5px;
      border-radius: 3px;
    }
    
    .trending-info { flex: 1; min-width: 0; }
    .trending-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .trending-channel {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 6px;
    }
    .trending-stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 12px;
      background: var(--bg-hover);
      color: var(--text-secondary);
    }
    .stat-pill.views { color: var(--accent); background: rgba(124,90,255,0.1); }
    .stat-pill.likes { color: var(--accent-2); background: rgba(255,90,124,0.1); }
    
    .trend-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .fire-badge {
      background: linear-gradient(135deg, #ff5a7c, #fbbf24);
      color: white;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    @media (max-width: 768px) {
      .trending-thumb { width: 120px; }
      .rank-num { font-size: 20px; min-width: 28px; }
      .trending-title { font-size: 14px; }
    }
  </style>
<style>
/* ViewTube - Shared Styles */
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #111118;
  --bg-card: #16161f;
  --bg-hover: #1e1e2a;
  --bg-input: #1a1a24;
  --border: #2a2a38;
  --border-subtle: #1e1e2a;
  --text-primary: #f0f0f8;
  --text-secondary: #9898b8;
  --text-muted: #5a5a78;
  --accent: #7c5aff;
  --accent-glow: rgba(124, 90, 255, 0.3);
  --accent-hover: #9575ff;
  --accent-2: #ff5a7c;
  --accent-2-glow: rgba(255, 90, 124, 0.3);
  --verified-blue: #5ab4ff;
  --verified-gold: #ffd700;
  --verified-black: #e0e0e0;
  --success: #4ade80;
  --warning: #fbbf24;
  --danger: #f87171;
  --sidebar-width: 240px;
  --header-height: 58px;
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 30px rgba(124, 90, 255, 0.15);
  --transition: 0.2s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* Header */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-height);
  background: rgba(10, 10, 15, 0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  z-index: 1000;
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  box-shadow: 0 0 16px var(--accent-glow);
}

.logo-text {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text-primary);
}

.logo-text span { color: var(--accent); }

.header-search {
  flex: 1;
  max-width: 560px;
  margin: 0 auto;
  display: flex;
  gap: 0;
}

.search-input-wrap {
  flex: 1;
  position: relative;
}

.search-input {
  width: 100%;
  height: 40px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-right: none;
  border-radius: var(--radius) 0 0 var(--radius);
  color: var(--text-primary);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  padding: 0 16px;
  outline: none;
  transition: border-color var(--transition);
}

.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-muted); }

.search-btn {
  height: 40px;
  padding: 0 18px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-left: none;
  border-radius: 0 var(--radius) var(--radius) 0;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}

.search-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  border: none;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: white;
  box-shadow: 0 0 16px var(--accent-glow);
}
.btn-primary:hover { background: var(--accent-hover); box-shadow: 0 0 24px var(--accent-glow); }

.btn-secondary {
  background: var(--bg-hover);
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid transparent;
}
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }

.icon-btn {
  width: 38px; height: 38px;
  border-radius: var(--radius-sm);
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  transition: all var(--transition);
}
.icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

/* Sidebar */
.sidebar {
  position: fixed;
  top: var(--header-height);
  left: 0;
  width: var(--sidebar-width);
  height: calc(100vh - var(--header-height));
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-subtle);
  overflow-y: auto;
  padding: 12px 0;
  z-index: 100;
  transition: transform 0.3s ease;
}

.sidebar.hidden { transform: translateX(-100%); }

.sidebar-section { padding: 8px 0; }

.sidebar-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 6px 20px;
  margin-top: 4px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 20px;
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  border-radius: 0;
  position: relative;
}

.sidebar-item:hover { background: var(--bg-hover); color: var(--text-primary); }

.sidebar-item.active {
  background: rgba(124, 90, 255, 0.1);
  color: var(--accent);
}

.sidebar-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 4px; bottom: 4px;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}

.sidebar-item svg, .sidebar-item .icon { width: 20px; height: 20px; flex-shrink: 0; }

.sidebar-divider {
  height: 1px;
  background: var(--border-subtle);
  margin: 8px 12px;
}

/* Main Content Area */
.main {
  margin-left: var(--sidebar-width);
  margin-top: var(--header-height);
  min-height: calc(100vh - var(--header-height));
  padding: 24px;
}

/* Category Chips */
.category-bar {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 12px;
  margin-bottom: 24px;
  scrollbar-width: none;
}
.category-bar::-webkit-scrollbar { display: none; }

.chip {
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  transition: all var(--transition);
}

.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }

/* Video Grid */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

/* Video Card */
.video-card {
  cursor: pointer;
  transition: transform var(--transition);
}

.video-card:hover { transform: translateY(-2px); }

.video-thumb {
  position: relative;
  aspect-ratio: 16/9;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-card);
}

.video-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}

.video-card:hover .video-thumb img { transform: scale(1.04); }

.video-duration {
  position: absolute;
  bottom: 8px; right: 8px;
  background: rgba(0,0,0,0.85);
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  padding: 2px 6px;
  border-radius: 4px;
}

.video-play-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.3s ease;
}

.video-card:hover .video-play-overlay { background: rgba(0,0,0,0.3); }

.play-btn-overlay {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(124,90,255,0.9);
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transform: scale(0.8);
  transition: all 0.3s ease;
  box-shadow: 0 0 24px var(--accent-glow);
}

.video-card:hover .play-btn-overlay { opacity: 1; transform: scale(1); }

.video-info {
  display: flex;
  gap: 10px;
  padding: 10px 4px 4px;
}

.channel-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  background: var(--bg-card);
}

.channel-avatar img { width: 100%; height: 100%; object-fit: cover; }

.video-meta { flex: 1; min-width: 0; }

.video-title {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.4;
  color: var(--text-primary);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 4px;
}

.video-channel {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  color: var(--text-secondary);
  text-decoration: none;
  width: fit-content;
}

.video-channel:hover { color: var(--text-primary); }

.video-stats {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* Verified Badges */
.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px; height: 16px;
  border-radius: 50%;
  font-size: 9px;
  flex-shrink: 0;
}

.badge-verified { background: var(--verified-blue); color: #fff; }
.badge-gold { background: var(--verified-gold); color: #000; }
.badge-black { background: #111; color: var(--verified-black); border: 1px solid var(--verified-black); }

.badge-lg { width: 20px; height: 20px; font-size: 11px; }

/* Section Titles */
.section-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title .accent { color: var(--accent); }

/* Trending Rank Badge */
.trending-rank {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white;
  font-size: 12px;
  font-weight: 800;
  flex-shrink: 0;
}

/* Toast Notification */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  padding: 14px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 14px;
  z-index: 9999;
  box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 10px;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s ease;
  pointer-events: none;
}

.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { border-color: var(--success); }
.toast.error { border-color: var(--danger); }

/* Empty State */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; color: var(--text-secondary); margin-bottom: 8px; }
.empty-state p { font-size: 14px; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.mobile-open { transform: translateX(0); }
  .main { margin-left: 0; padding: 16px; }
  .header-search { max-width: 200px; }
  .logo-text { display: none; }
}

</style>
</head>

async function loadJSON(path) {
  if (path.includes('videos')) return JSON.parse(JSON.stringify(_VIDEOS_DATA));

// ViewTube - Shared Utilities

// loadJSON: using inline data (see _VIDEOS_DATA etc above)

// --- Verified Badge ---
function getBadgeHTML(channel, size = '') {
  const cls = `badge ${size}`;
  if (channel.IsBlackVerified) {
    return `<span class="${cls} badge-black" title="Official Creator">✓</span>`;
  }
  if (channel.IsGoldVerified) {
    return `<span class="${cls} badge-gold" title="Gold Verified">★</span>`;
  }
  if (channel.IsVerified) {
    return `<span class="${cls} badge-verified" title="Verified">✓</span>`;
  }
  return '';
}

// --- Format Numbers ---
function formatViews(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1).replace(/\.0$/, '') + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
  return n.toString();
}

// --- Video Card ---
function buildVideoCard(video, channel) {
  const card = document.createElement('div');
  card.className = 'video-card';
  card.innerHTML = `
    <div class="video-thumb">
      <img src="${video.thumbnail}" alt="${escapeHTML(video.title)}" loading="lazy">
      <div class="video-play-overlay">
        <div class="play-btn-overlay">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
      </div>
      <span class="video-duration">${video.duration}</span>
    </div>
    <div class="video-info">
      <div class="channel-avatar">
        <img src="${channel ? channel.avatar : ''}" alt="${channel ? channel.name : ''}" loading="lazy">
      </div>
      <div class="video-meta">
        <div class="video-title">${escapeHTML(video.title)}</div>
        <a class="video-channel" href="#">
          ${channel ? escapeHTML(channel.name) : 'Unknown'}
          ${channel ? getBadgeHTML(channel) : ''}
        </a>
        <div class="video-stats">${formatViews(video.views)} views &middot; ${video.uploadedAgo}</div>
      </div>
    </div>
  `;
  card.addEventListener('click', () => {
    window.location.href = `watch.html?v=${video.id}`;
  });
  return card;
}

// --- Escape HTML ---
function escapeHTML(str) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str || ''));
  return div.innerHTML;
}

// --- Toast ---
function showToast(msg, type = 'info') {
  let toast = document.getElementById('global-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'global-toast';
    toast.className = 'toast';
    document.body.appendChild(toast);
  }
  const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
  toast.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  toast.className = `toast ${type} show`;
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => { toast.classList.remove('show'); }, 3000);
}

// --- URL Params ---
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

// --- Sidebar toggle ---
function initSidebarToggle() {
  const toggle = document.getElementById('sidebar-toggle');
  const sidebar = document.querySelector('.sidebar');
  if (toggle && sidebar) {
    toggle.addEventListener('click', () => {
      if (window.innerWidth <= 768) {
        sidebar.classList.toggle('mobile-open');
      } else {
        sidebar.classList.toggle('hidden');
        const main = document.querySelector('.main');
        if (main) main.classList.toggle('no-sidebar');
      }
    });
  }
}

// --- Active Sidebar Link ---
function setActiveSidebarLink() {
  const page = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.sidebar-item[data-page]').forEach(el => {
    if (el.dataset.page === page) el.classList.add('active');
  });
}

// --- Init Search ---
function initSearch() {
  const input = document.querySelector('.search-input');
  const btn = document.querySelector('.search-btn');
  const doSearch = () => {
    const q = input?.value.trim();
    if (q) showToast(`Searching for "${q}"…`, 'info');
  };
  btn?.addEventListener('click', doSearch);
  input?.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
}

<script>
  let allVideos = [], allChannels = [], activeTab = 'all';

  async function init() {
    [allVideos, allChannels] = await Promise.all([loadJSON('videos.json'), loadJSON('channels.json')]);
    renderTrending(allVideos);
    initTabs();
    initSidebarToggle();
    initSearch();
  }

  function renderTrending(videos) {
    // Sort by views descending
    const sorted = [...videos].sort((a, b) => b.views - a.views);
    const list = document.getElementById('trending-list');
    list.innerHTML = '';
    if (!sorted.length) {
      list.innerHTML = `<div class="empty-state"><div class="icon">📉</div><h3>No trending videos</h3><p>Check back later!</p></div>`;
      return;
    }
    sorted.forEach((video, i) => {
      const channel = allChannels.find(c => c.id === video.channelId);
      const rank = i + 1;
      const el = document.createElement('div');
      el.className = 'trending-item';
      el.innerHTML = `
        <div class="rank-num ${rank <= 3 ? 'top3' : ''}">${rank}</div>
        <div class="trending-thumb">
          <img src="${video.thumbnail}" alt="${escapeHTML(video.title)}" loading="lazy">
          <span class="trending-duration">${video.duration}</span>
        </div>
        <div class="trending-info">
          <div class="trending-title">${escapeHTML(video.title)}</div>
          <div class="trending-channel">
            ${channel ? `<img src="${channel.avatar}" style="width:18px;height:18px;border-radius:50%;object-fit:cover;" alt="">` : ''}
            ${channel ? escapeHTML(channel.name) : 'Unknown'} ${channel ? getBadgeHTML(channel) : ''}
            <span style="margin-left:4px;">· ${video.uploadedAgo}</span>
          </div>
          <div class="trending-stats">
            <span class="stat-pill views">👁 ${formatViews(video.views)} views</span>
            <span class="stat-pill likes">❤️ ${formatViews(video.likes)}</span>
            <span class="stat-pill">${video.category}</span>
          </div>
        </div>
        <div class="trend-badge">
          ${rank <= 3 ? `<span class="fire-badge">#${rank} 🔥</span>` : ''}
        </div>
      `;
      el.addEventListener('click', () => { window.location.href = `watch.html?v=${video.id}`; });
      list.appendChild(el);
    });
  }

  function initTabs() {
    document.querySelectorAll('.trend-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.trend-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeTab = tab.dataset.cat;
        const filtered = activeTab === 'all' ? allVideos : allVideos.filter(v => v.category === activeTab);
        renderTrending(filtered);
      });
    });
  }

  init();
</script>
