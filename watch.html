<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ViewTube – Watch</title>
  <style>
    body { background: var(--bg-primary); }

    .watch-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 24px;
      max-width: 1400px;
    }

    /* Custom Player */
    .player-wrap {
      background: #000;
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: relative;
      aspect-ratio: 16/9;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6);
    }

    .player-video {
      width: 100%; height: 100%;
      display: block;
      cursor: pointer;
    }

    .player-thumbnail {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
      transition: opacity 0.3s ease;
    }

    .player-ui {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      z-index: 5;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 40%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .player-wrap:hover .player-ui,
    .player-wrap.paused .player-ui { opacity: 1; }

    .player-center-btn {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 6;
      pointer-events: none;
    }

    .center-play-btn {
      width: 68px; height: 68px;
      border-radius: 50%;
      background: rgba(124,90,255,0.9);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(124,90,255,0.5);
      transform: scale(0);
      opacity: 0;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }

    .player-wrap.paused .center-play-btn {
      transform: scale(1);
      opacity: 1;
    }

    .player-controls {
      padding: 12px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Progress Bar */
    .progress-wrap {
      position: relative;
      height: 4px;
      cursor: pointer;
      padding: 8px 0;
      margin: -8px 0;
    }

    .progress-track {
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s linear;
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .progress-wrap:hover .progress-track { height: 6px; }

    .progress-thumb {
      position: absolute;
      top: 50%;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      transform: translate(-50%, -50%);
      box-shadow: 0 0 8px var(--accent-glow);
      display: none;
      pointer-events: none;
    }

    .progress-wrap:hover .progress-thumb { display: block; }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      font-size: 18px;
    }

    .ctrl-btn:hover { background: rgba(255,255,255,0.1); }

    .ctrl-btn svg { width: 20px; height: 20px; }

    .vol-slider {
      width: 70px;
      height: 4px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .player-time {
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    .player-spacer { flex: 1; }

    .quality-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      cursor: pointer;
    }

    /* Video Info */
    .video-page-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.4;
      margin: 16px 0 10px;
    }

    .video-page-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 16px;
    }

    .video-page-stats { color: var(--text-muted); font-size: 14px; }

    .video-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      border-radius: 20px;
      background: var(--bg-hover);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      font-family: 'Outfit', sans-serif;
    }

    .action-btn:hover { border-color: var(--accent); color: var(--accent); }
    .action-btn.liked { background: rgba(124,90,255,0.15); border-color: var(--accent); color: var(--accent); }

    /* Channel Row */
    .channel-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .channel-row-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
    }

    .channel-row-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .channel-row-info { flex: 1; }
    .channel-row-name {
      font-size: 15px;
      font-weight: 700;
      display: flex; align-items: center; gap: 6px;
    }
    .channel-row-subs { font-size: 13px; color: var(--text-muted); }

    .sub-btn {
      padding: 9px 20px;
      border-radius: 20px;
      background: var(--accent);
      color: white;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .sub-btn:hover { background: var(--accent-hover); }
    .sub-btn.subscribed {
      background: var(--bg-hover);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    /* Description */
    .description-box {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 20px;
    }

    .desc-text {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .desc-text.expanded { -webkit-line-clamp: unset; overflow: visible; }

    .desc-toggle {
      background: none;
      border: none;
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      padding: 0;
    }

    .desc-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .desc-tag {
      font-size: 12px;
      color: var(--accent);
      background: rgba(124,90,255,0.1);
      padding: 2px 10px;
      border-radius: 12px;
      cursor: pointer;
    }

    /* Comments */
    .comments-section { margin-top: 24px; }

    .comments-header {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .comments-count {
      background: var(--bg-hover);
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .comment-input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .comment-input-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .comment-input-wrap { flex: 1; }

    .comment-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      padding: 6px 0;
      outline: none;
      transition: border-color var(--transition);
    }

    .comment-input:focus { border-color: var(--accent); }
    .comment-input::placeholder { color: var(--text-muted); }

    .comment-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
      display: none;
    }

    .comment-input:focus + .comment-actions,
    .comment-input-wrap:focus-within .comment-actions { display: flex; }

    .comment {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .comment-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
    }

    .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .comment-body { flex: 1; }
    .comment-user {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .comment-time { color: var(--text-muted); font-weight: 400; font-size: 12px; }

    .comment-text {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .comment-likes {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: color var(--transition);
      background: none;
      border: none;
      font-family: 'Outfit', sans-serif;
    }

    .comment-likes:hover { color: var(--accent); }

    /* Sidebar */
    .watch-sidebar { }

    .up-next-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text-secondary);
    }

    .up-next-card {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      cursor: pointer;
      border-radius: var(--radius-sm);
      padding: 6px;
      transition: background var(--transition);
    }

    .up-next-card:hover { background: var(--bg-hover); }

    .up-next-thumb {
      width: 120px;
      aspect-ratio: 16/9;
      border-radius: var(--radius-sm);
      overflow: hidden;
      flex-shrink: 0;
      background: var(--bg-card);
      position: relative;
    }

    .up-next-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .up-next-duration {
      position: absolute;
      bottom: 4px; right: 4px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      padding: 1px 4px;
      border-radius: 3px;
    }

    .up-next-info { flex: 1; min-width: 0; }
    .up-next-title-text {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .up-next-channel {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .up-next-views { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    @media (max-width: 1024px) {
      .watch-layout { grid-template-columns: 1fr; }
      .watch-sidebar { display: none; }
    }

    @media (max-width: 768px) {
      .main { padding: 12px; }
    }
  </style>
<style>
/* ViewTube - Shared Styles */
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #111118;
  --bg-card: #16161f;
  --bg-hover: #1e1e2a;
  --bg-input: #1a1a24;
  --border: #2a2a38;
  --border-subtle: #1e1e2a;
  --text-primary: #f0f0f8;
  --text-secondary: #9898b8;
  --text-muted: #5a5a78;
  --accent: #7c5aff;
  --accent-glow: rgba(124, 90, 255, 0.3);
  --accent-hover: #9575ff;
  --accent-2: #ff5a7c;
  --accent-2-glow: rgba(255, 90, 124, 0.3);
  --verified-blue: #5ab4ff;
  --verified-gold: #ffd700;
  --verified-black: #e0e0e0;
  --success: #4ade80;
  --warning: #fbbf24;
  --danger: #f87171;
  --sidebar-width: 240px;
  --header-height: 58px;
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 30px rgba(124, 90, 255, 0.15);
  --transition: 0.2s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* Header */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-height);
  background: rgba(10, 10, 15, 0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  z-index: 1000;
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  box-shadow: 0 0 16px var(--accent-glow);
}

.logo-text {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text-primary);
}

.logo-text span { color: var(--accent); }

.header-search {
  flex: 1;
  max-width: 560px;
  margin: 0 auto;
  display: flex;
  gap: 0;
}

.search-input-wrap {
  flex: 1;
  position: relative;
}

.search-input {
  width: 100%;
  height: 40px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-right: none;
  border-radius: var(--radius) 0 0 var(--radius);
  color: var(--text-primary);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  padding: 0 16px;
  outline: none;
  transition: border-color var(--transition);
}

.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-muted); }

.search-btn {
  height: 40px;
  padding: 0 18px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-left: none;
  border-radius: 0 var(--radius) var(--radius) 0;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}

.search-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  border: none;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: white;
  box-shadow: 0 0 16px var(--accent-glow);
}
.btn-primary:hover { background: var(--accent-hover); box-shadow: 0 0 24px var(--accent-glow); }

.btn-secondary {
  background: var(--bg-hover);
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid transparent;
}
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }

.icon-btn {
  width: 38px; height: 38px;
  border-radius: var(--radius-sm);
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  transition: all var(--transition);
}
.icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

/* Sidebar */
.sidebar {
  position: fixed;
  top: var(--header-height);
  left: 0;
  width: var(--sidebar-width);
  height: calc(100vh - var(--header-height));
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-subtle);
  overflow-y: auto;
  padding: 12px 0;
  z-index: 100;
  transition: transform 0.3s ease;
}

.sidebar.hidden { transform: translateX(-100%); }

.sidebar-section { padding: 8px 0; }

.sidebar-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 6px 20px;
  margin-top: 4px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 20px;
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  border-radius: 0;
  position: relative;
}

.sidebar-item:hover { background: var(--bg-hover); color: var(--text-primary); }

.sidebar-item.active {
  background: rgba(124, 90, 255, 0.1);
  color: var(--accent);
}

.sidebar-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 4px; bottom: 4px;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}

.sidebar-item svg, .sidebar-item .icon { width: 20px; height: 20px; flex-shrink: 0; }

.sidebar-divider {
  height: 1px;
  background: var(--border-subtle);
  margin: 8px 12px;
}

/* Main Content Area */
.main {
  margin-left: var(--sidebar-width);
  margin-top: var(--header-height);
  min-height: calc(100vh - var(--header-height));
  padding: 24px;
}

/* Category Chips */
.category-bar {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 12px;
  margin-bottom: 24px;
  scrollbar-width: none;
}
.category-bar::-webkit-scrollbar { display: none; }

.chip {
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  transition: all var(--transition);
}

.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }

/* Video Grid */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

/* Video Card */
.video-card {
  cursor: pointer;
  transition: transform var(--transition);
}

.video-card:hover { transform: translateY(-2px); }

.video-thumb {
  position: relative;
  aspect-ratio: 16/9;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-card);
}

.video-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}

.video-card:hover .video-thumb img { transform: scale(1.04); }

.video-duration {
  position: absolute;
  bottom: 8px; right: 8px;
  background: rgba(0,0,0,0.85);
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  padding: 2px 6px;
  border-radius: 4px;
}

.video-play-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.3s ease;
}

.video-card:hover .video-play-overlay { background: rgba(0,0,0,0.3); }

.play-btn-overlay {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(124,90,255,0.9);
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transform: scale(0.8);
  transition: all 0.3s ease;
  box-shadow: 0 0 24px var(--accent-glow);
}

.video-card:hover .play-btn-overlay { opacity: 1; transform: scale(1); }

.video-info {
  display: flex;
  gap: 10px;
  padding: 10px 4px 4px;
}

.channel-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  background: var(--bg-card);

}

.badge-gold { background: var(--verified-gold); color: #000; }
.badge-black { background: #111; color: var(--verified-black); border: 1px solid var(--verified-black); }

.badge-lg { width: 20px; height: 20px; font-size: 11px; }

/* Section Titles */
.section-title {

  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;

.toast.show { opacity: 1; transform: translateY(0); }

// --- Verified Badge ---
function getBadgeHTML(channel, size = '') {
  const cls = `badge ${size}`;
  if (channel.IsBlackVerified) {
    return `<span class="${cls} badge-black" title="Official Creator">✓</span>`;
  }
  if (channel.IsGoldVerified) {
    return `<span class="${cls} badge-gold" title="Gold Verified">★</span>`;
  }
  if (channel.IsVerified) {
    return `<span class="${cls} badge-verified" title="Verified">✓</span>`;
  }
  return '';
}

// --- Format Numbers ---
function formatViews(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1).replace(/\.0$/, '') + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
  return n.toString();
}

// --- Video Card ---
function buildVideoCard(video, channel) {
  const card = document.createElement('div');
  card.className = 'video-card';
  card.innerHTML = `
    <div class="video-thumb">
      <img src="${video.thumbnail}" alt="${escapeHTML(video.title)}" loading="lazy">
      <div class="video-play-overlay">
        <div class="play-btn-overlay">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
      </div>
      <span class="video-duration">${video.duration}</span>
    </div>
    <div class="video-info">
      <div class="channel-avatar">
        <img src="${channel ? channel.avatar : ''}" alt="${channel ? channel.name : ''}" loading="lazy">
      </div>
      <div class="video-meta">
        <div class="video-title">${escapeHTML(video.title)}</div>
        <a class="video-channel" href="#">
          ${channel ? escapeHTML(channel.name) : 'Unknown'}
          ${channel ? getBadgeHTML(channel) : ''}
        </a>
        <div class="video-stats">${formatViews(video.views)} views &middot; ${video.uploadedAgo}</div>
      </div>
    </div>
  `;
  card.addEventListener('click', () => {
    window.location.href = `watch.html?v=${video.id}`;
  });
  return card;
}

// --- Escape HTML ---
function escapeHTML(str) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str || ''));
  return div.innerHTML;
}

// --- Toast ---
function showToast(msg, type = 'info') {
  let toast = document.getElementById('global-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'global-toast';
    toast.className = 'toast';
    document.body.appendChild(toast);
  }
  const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
  toast.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  toast.className = `toast ${type} show`;
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => { toast.classList.remove('show'); }, 3000);
}

// --- URL Params ---
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

// --- Sidebar toggle ---
function initSidebarToggle() {
  const toggle = document.getElementById('sidebar-toggle');
  const sidebar = document.querySelector('.sidebar');
  if (toggle && sidebar) {
    toggle.addEventListener('click', () => {
      if (window.innerWidth <= 768) {
        sidebar.classList.toggle('mobile-open');
      } else {
        sidebar.classList.toggle('hidden');
        const main = document.querySelector('.main');
        if (main) main.classList.toggle('no-sidebar');
      }
    });
  }
}

// --- Active Sidebar Link ---
function setActiveSidebarLink() {
  const page = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.sidebar-item[data-page]').forEach(el => {
    if (el.dataset.page === page) el.classList.add('active');
  });
}

// --- Init Search ---
function initSearch() {
  const input = document.querySelector('.search-input');
  const btn = document.querySelector('.search-btn');
  const doSearch = () => {
    const q = input?.value.trim();
    if (q) showToast(`Searching for "${q}"…`, 'info');
  };
  btn?.addEventListener('click', doSearch);
  input?.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
}

              <button class="ctrl-btn" id="play-pause-btn" title="Play/Pause">
                <svg viewBox="0 0 24 24" fill="white" id="play-pause-icon"><polygon points="5,3 19,12 5,21"/></svg>
              </button>
              <button class="ctrl-btn" id="skip-back-btn" title="-10s">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/><text x="8" y="16" fill="white" font-size="7" stroke="none" font-family="Outfit">10</text></svg>
              </button>
              <button class="ctrl-btn" id="skip-fwd-btn" title="+10s">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.51"/><text x="8" y="16" fill="white" font-size="7" stroke="none" font-family="Outfit">10</text></svg>
              </button>
              <button class="ctrl-btn" id="mute-btn" title="Mute">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" id="vol-icon"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
              </button>
              <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="80">
              <span class="player-time" id="player-time">0:00 / 0:00</span>
              <div class="player-spacer"></div>
              <button class="quality-btn" id="quality-btn">HD</button>
              <button class="ctrl-btn" id="fullscreen-btn" title="Fullscreen">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Title & Actions -->
      <div id="video-info">
        <div class="video-page-title" id="vid-title">Loading…</div>
        <div class="video-page-meta">
          <span class="video-page-stats" id="vid-stats"></span>
          <div class="video-actions">
            <button class="action-btn" id="like-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3z"/></svg>
              <span id="like-count">0</span>
            </button>
            <button class="action-btn" id="dislike-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3z"/></svg>
            </button>
            <button class="action-btn" onclick="showToast('Link copied!','success')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
              Share
            </button>
            <button class="action-btn" onclick="showToast('Saved to Watch Later','success')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
              Save
            </button>
          </div>
        </div>
      </div>

      <!-- Channel Row -->
      <div class="channel-row" id="channel-row">
        <div class="channel-row-avatar"><img id="ch-avatar" src="" alt=""></div>
        <div class="channel-row-info">
          <div class="channel-row-name" id="ch-name"></div>
          <div class="channel-row-subs" id="ch-subs"></div>
        </div>
        <button class="sub-btn" id="sub-btn" onclick="toggleSubscribe(this)">Subscribe</button>
      </div>

      <!-- Description -->
      <div class="description-box" id="desc-box">
        <div class="desc-text" id="desc-text"></div>
        <button class="desc-toggle" id="desc-toggle" onclick="toggleDesc()">Show more</button>
        <div class="desc-tags" id="desc-tags"></div>
      </div>

      <!-- Comments -->
      <div class="comments-section">
        <div class="comments-header">
          Comments <span class="comments-count" id="comment-count">0</span>
        </div>

        <!-- Add Comment -->
        <div class="comment-input-row">
          <div class="comment-input-avatar">V</div>
          <div class="comment-input-wrap">
            <input class="comment-input" id="comment-input" type="text" placeholder="Add a comment…">
            <div class="comment-actions" id="comment-actions" style="display:none;">
              <button class="btn btn-ghost" style="font-size:13px;" onclick="cancelComment()">Cancel</button>
              <button class="btn btn-primary" style="font-size:13px;" onclick="postComment()">Comment</button>
            </div>
          </div>
        </div>

        <div id="comments-list"></div>
      </div>
    </div>

    <!-- Right Sidebar: Up Next -->
    <div class="watch-sidebar">
      <div class="up-next-title">Up Next</div>
      <div id="up-next-list"></div>
    </div>
  </div>
</main>

<div class="toast" id="global-toast"></div>
<script>
  let videoData = null, channelData = null, allVids = [], allChs = [];
  let isLiked = false, isSubscribed = false;

  async function init() {
    [allVids, allChs] = await Promise.all([loadJSON('videos.json'), loadJSON('channels.json')]);
    const vid = getParam('v');
    videoData = allVids.find(v => v.id === vid) || allVids[0];
    if (!videoData) { document.getElementById('vid-title').textContent = 'Video not found'; return; }
    channelData = allChs.find(c => c.id === videoData.channelId);
    renderVideo();
    renderUpNext();
    initPlayer();
    initSearch();
  }

  function renderVideo() {
    document.title = `${videoData.title} – ViewTube`;
    document.getElementById('vid-title').textContent = videoData.title;
    document.getElementById('vid-stats').textContent = `${videoData.viewsFormatted} · ${videoData.uploadedAgo}`;
    document.getElementById('like-count').textContent = formatViews(videoData.likes);
    document.getElementById('player-thumbnail').src = videoData.thumbnail;

    if (channelData) {
      document.getElementById('ch-avatar').src = channelData.avatar;
      document.getElementById('ch-name').innerHTML = escapeHTML(channelData.name) + ' ' + getBadgeHTML(channelData, 'badge-lg');
      document.getElementById('ch-subs').textContent = channelData.subscribers + ' subscribers';
    }

    document.getElementById('desc-text').textContent = videoData.description || '';
    if (videoData.tags) {
      document.getElementById('desc-tags').innerHTML = videoData.tags.map(t =>
        `<span class="desc-tag">#${escapeHTML(t)}</span>`).join('');
    }
    renderComments(videoData.comments || []);
  }

  function renderComments(comments) {
    document.getElementById('comment-count').textContent = comments.length;
    const list = document.getElementById('comments-list');
    list.innerHTML = '';
    comments.forEach(c => {
      const el = document.createElement('div');
      el.className = 'comment';
      el.innerHTML = `
        <div class="comment-avatar"><img src="${c.avatar}" alt="${escapeHTML(c.user)}"></div>
        <div class="comment-body">
          <div class="comment-user">${escapeHTML(c.user)} <span class="comment-time">${c.time}</span></div>
          <div class="comment-text">${escapeHTML(c.text)}</div>
          <button class="comment-likes" onclick="likeComment(this, ${c.likes})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3z"/></svg>
            ${formatViews(c.likes)}
          </button>
        </div>
      `;
      list.appendChild(el);
    });
  }

  function renderUpNext() {
    const list = document.getElementById('up-next-list');
    const others = allVids.filter(v => v.id !== videoData.id).slice(0, 8);
    others.forEach(v => {
      const ch = allChs.find(c => c.id === v.channelId);
      const el = document.createElement('div');
      el.className = 'up-next-card';
      el.innerHTML = `
        <div class="up-next-thumb">
          <img src="${v.thumbnail}" alt="${escapeHTML(v.title)}" loading="lazy">
          <span class="up-next-duration">${v.duration}</span>
        </div>
        <div class="up-next-info">
          <div class="up-next-title-text">${escapeHTML(v.title)}</div>
          <div class="up-next-channel">
            ${ch ? escapeHTML(ch.name) : 'Unknown'} ${ch ? getBadgeHTML(ch) : ''}
          </div>
          <div class="up-next-views">${formatViews(v.views)} views</div>
        </div>
      `;
      el.addEventListener('click', () => { window.location.href = `watch.html?v=${v.id}`; });
      list.appendChild(el);
    });
  }

  // --- Player ---
  function initPlayer() {
    const wrap = document.getElementById('player-wrap');
    const video = document.getElementById('player-video');
    const thumbnail = document.getElementById('player-thumbnail');
    const progressFill = document.getElementById('progress-fill');
    const progressThumb = document.getElementById('progress-thumb');
    const progressWrap = document.getElementById('progress-wrap');
    const playPauseIcon = document.getElementById('play-pause-icon');
    const playerTime = document.getElementById('player-time');
    const volSlider = document.getElementById('vol-slider');
    let isDragging = false;

    video.volume = 0.8;

    // Click on thumbnail to "play"
    thumbnail.addEventListener('click', () => simulatePlay());
    document.getElementById('center-play-btn').parentElement.addEventListener('click', () => simulatePlay());

    function simulatePlay() {
      if (!videoData.videoUrl) {
        // Simulate playback with thumbnail visible
        wrap.classList.toggle('paused');
        if (!wrap.classList.contains('paused')) {
          playPauseIcon.innerHTML = '<rect x="6" y="4" width="4" height="16" fill="white"/><rect x="14" y="4" width="4" height="16" fill="white"/>';
          showToast('Playback simulation (no video source)', 'info');
          startFakeProgress();
          thumbnail.style.opacity = '0.3';
        } else {
          playPauseIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
          stopFakeProgress();
          thumbnail.style.opacity = '1';
        }
        return;
      }
      if (video.paused) { video.play(); wrap.classList.remove('paused'); }
      else { video.pause(); wrap.classList.add('paused'); }
    }

    // Play/Pause button
    document.getElementById('play-pause-btn').addEventListener('click', simulatePlay);

    // Skip
    document.getElementById('skip-back-btn').addEventListener('click', () => { fakeCurrentTime = Math.max(0, fakeCurrentTime - 10); updateProgress(); });
    document.getElementById('skip-fwd-btn').addEventListener('click', () => { fakeCurrentTime = Math.min(fakeDuration, fakeCurrentTime + 10); updateProgress(); });

    // Volume
    volSlider.addEventListener('input', () => {
      video.volume = volSlider.value / 100;
      updateVolIcon(volSlider.value);
    });

    document.getElementById('mute-btn').addEventListener('click', () => {
      if (video.volume > 0) { video.volume = 0; volSlider.value = 0; }
      else { video.volume = 0.8; volSlider.value = 80; }
      updateVolIcon(video.volume * 100);
    });

    function updateVolIcon(v) {
      const icon = document.getElementById('vol-icon');
      if (v == 0) {
        icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15" stroke="white" stroke-width="2"/><line x1="17" y1="9" x2="23" y2="15" stroke="white" stroke-width="2"/>';
      } else {
        icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
      }
    }

    // Fullscreen
    document.getElementById('fullscreen-btn').addEventListener('click', () => {
      if (!document.fullscreenElement) wrap.requestFullscreen?.();
      else document.exitFullscreen?.();
    });

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'Space') { e.preventDefault(); simulatePlay(); }
      if (e.code === 'ArrowRight') { fakeCurrentTime = Math.min(fakeDuration, fakeCurrentTime + 10); updateProgress(); }
      if (e.code === 'ArrowLeft') { fakeCurrentTime = Math.max(0, fakeCurrentTime - 10); updateProgress(); }
      if (e.code === 'KeyM') { if (video.volume > 0) { video.volume = 0; volSlider.value = 0; } else { video.volume = 0.8; volSlider.value = 80; } updateVolIcon(video.volume * 100); }
    });

    // Progress dragging
    progressWrap.addEventListener('mousedown', (e) => {
      isDragging = true;
      seekTo(e);
    });
    document.addEventListener('mousemove', (e) => { if (isDragging) seekTo(e); });
    document.addEventListener('mouseup', () => { isDragging = false; });

    function seekTo(e) {
      const rect = progressWrap.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      fakeCurrentTime = ratio * fakeDuration;
      updateProgress();
    }

    // Fake progress simulation
    let fakeDuration = parseDuration(videoData.duration);
    let fakeCurrentTime = 0;
    let fakeTimer = null;

    function parseDuration(str) {
      const parts = str.split(':').reverse();
      let total = 0;
      if (parts[0]) total += parseInt(parts[0]);
      if (parts[1]) total += parseInt(parts[1]) * 60;
      if (parts[2]) total += parseInt(parts[2]) * 3600;
      return total || 100;
    }

    function formatTime(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60);
      if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      return `${m}:${String(s).padStart(2,'0')}`;
    }

    function updateProgress() {
      const pct = fakeDuration > 0 ? (fakeCurrentTime / fakeDuration) * 100 : 0;
      progressFill.style.width = pct + '%';
      progressThumb.style.left = pct + '%';
      playerTime.textContent = `${formatTime(fakeCurrentTime)} / ${formatTime(fakeDuration)}`;
    }

    function startFakeProgress() {
      stopFakeProgress();
      fakeTimer = setInterval(() => {
        if (!wrap.classList.contains('paused')) {
          fakeCurrentTime = Math.min(fakeDuration, fakeCurrentTime + 1);
          updateProgress();
          if (fakeCurrentTime >= fakeDuration) { wrap.classList.add('paused'); stopFakeProgress(); playPauseIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>'; }
        }
      }, 1000);
    }

    function stopFakeProgress() {
      if (fakeTimer) { clearInterval(fakeTimer); fakeTimer = null; }
    }

    updateProgress();
  }

  // --- Like / Subscribe ---
  document.getElementById('like-btn').addEventListener('click', function() {
    isLiked = !isLiked;
    this.classList.toggle('liked', isLiked);
    const newCount = videoData.likes + (isLiked ? 1 : 0);
    document.getElementById('like-count').textContent = formatViews(newCount);
    showToast(isLiked ? 'Liked! 👍' : 'Like removed', isLiked ? 'success' : 'info');
  });

  function toggleSubscribe(btn) {
    isSubscribed = !isSubscribed;
    btn.textContent = isSubscribed ? 'Subscribed ✓' : 'Subscribe';
    btn.classList.toggle('subscribed', isSubscribed);
    showToast(isSubscribed ? `Subscribed to ${channelData?.name || 'channel'}!` : 'Unsubscribed', isSubscribed ? 'success' : 'info');
  }

  // --- Description ---
  function toggleDesc() {
    const text = document.getElementById('desc-text');
    const btn = document.getElementById('desc-toggle');
    text.classList.toggle('expanded');
    btn.textContent = text.classList.contains('expanded') ? 'Show less' : 'Show more';
  }

  // --- Comments ---
  const commentInput = document.getElementById('comment-input');
  const commentActions = document.getElementById('comment-actions');
  commentInput.addEventListener('focus', () => commentActions.style.display = 'flex');

  function cancelComment() {
    commentInput.value = '';
    commentInput.blur();
    commentActions.style.display = 'none';
  }

  let userComments = [];

  function postComment() {
    const text = commentInput.value.trim();
    if (!text) return;
    const newComment = {
      id: 'uc_' + Date.now(),
      user: 'You',
      avatar: `https://api.dicebear.com/7.x/thumbs/svg?seed=user${Date.now()}`,
      text, likes: 0, time: 'just now'
    };
    userComments.unshift(newComment);
    const allComments = [...userComments, ...(videoData.comments || [])];
    renderComments(allComments);
    commentInput.value = '';
    commentActions.style.display = 'none';
    showToast('Comment posted!', 'success');
  }

  function likeComment(btn, baseLikes) {
    const isLiked = btn.dataset.liked === '1';
    if (isLiked) {
      btn.dataset.liked = '0';
      btn.style.color = '';
      btn.querySelector('svg').setAttribute('stroke', 'currentColor');
      btn.childNodes[btn.childNodes.length-1].textContent = ' ' + formatViews(baseLikes);
    } else {
      btn.dataset.liked = '1';
      btn.style.color = 'var(--accent)';
      btn.childNodes[btn.childNodes.length-1].textContent = ' ' + formatViews(baseLikes + 1);
    }
  }

  init();
</script>
</body>
</html>
