  <style>
    body { overflow: hidden; }
    .shorts-layout {
      display: flex;
      height: 100vh;
      padding-top: var(--header-height);
      background: var(--bg-primary);
    }

    /* Shorts Feed */
    .shorts-feed {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      height: calc(100vh - var(--header-height));
    }

    .short-player-wrap {
      position: relative;
      height: calc(100vh - var(--header-height) - 20px);
      max-height: 820px;
      aspect-ratio: 9/16;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    }

    .short-thumbnail {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .short-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px 16px;
    }

    /* Short Progress Bars */
    .short-progress-bars {
      display: flex;
      gap: 3px;
      margin-bottom: 14px;
    }
    .short-progress-bar {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      overflow: hidden;
    }
    .short-progress-fill {
      height: 100%;
      background: white;
      border-radius: 2px;
      width: 0%;
    }
    .short-progress-bar.done .short-progress-fill { width: 100%; }
    .short-progress-bar.active .short-progress-fill { transition: width 0.05s linear; }

    /* Short Info */
    .short-channel {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .short-ch-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid white;
      flex-shrink: 0;
    }
    .short-ch-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .short-ch-name {
      font-size: 14px;
      font-weight: 700;
      color: white;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .short-sub-btn {
      padding: 5px 12px;
      border-radius: 14px;
      background: white;
      color: #000;
      border: none;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
      font-family: 'Outfit', sans-serif;
    }
    .short-sub-btn:hover { background: var(--accent); color: white; }
    .short-sub-btn.subscribed { background: rgba(255,255,255,0.2); color: white; }

    .short-title {
      font-size: 14px;
      font-weight: 600;
      color: white;
      line-height: 1.4;
      margin-bottom: 8px;
      max-width: 280px;
    }

    .short-views {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }

    /* Center Play Button */
    .short-center-btn {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      pointer-events: none;
    }
    .short-play-btn {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      transform: scale(0);
      opacity: 0;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .short-player-wrap.paused .short-play-btn {
      transform: scale(1);
      opacity: 1;
    }

    /* Side Actions */
    .short-actions {
      position: absolute;
      right: -68px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    .short-action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: transform var(--transition);
    }
    .short-action-btn:hover { transform: scale(1.1); }
    .short-action-btn:active { transform: scale(0.95); }

    .short-action-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--bg-hover);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      color: white;
      transition: all var(--transition);
    }
    .short-action-btn:hover .short-action-icon { background: rgba(255,255,255,0.15); }
    .short-action-btn.liked .short-action-icon { background: rgba(124,90,255,0.3); border-color: var(--accent); color: var(--accent); }

    .short-action-label {
      font-size: 11px;
      color: white;
      font-weight: 600;
    }

    /* Nav Arrows */
    .short-nav {
      position: absolute;
      right: -68px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .short-nav-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--bg-hover);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      color: white;
    }
    .short-nav-btn:hover { background: var(--accent); border-color: var(--accent); }
    .short-nav-btn:disabled { opacity: 0.3; cursor: default; }

    /* Right Panel */
    .shorts-right-panel {
      width: 280px;
      padding: 24px 16px;
      overflow-y: auto;
      display: none;
    }

    @media (min-width: 1100px) {
      .shorts-right-panel { display: block; }
      .short-actions { right: -68px; }
    }

    @media (max-width: 700px) {
      .short-player-wrap {
        width: 100vw;
        max-width: 100vw;
        border-radius: 0;
        height: calc(100vh - var(--header-height));
        max-height: none;
      }
      .short-actions { right: 8px; }
      .short-nav { display: none; }
    }

<style>
/* ViewTube - Shared Styles */
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #111118;
  --bg-card: #16161f;
  --bg-hover: #1e1e2a;
  --bg-input: #1a1a24;
  --border: #2a2a38;
  --border-subtle: #1e1e2a;
  --text-primary: #f0f0f8;
  --text-secondary: #9898b8;
  --text-muted: #5a5a78;
  --accent: #7c5aff;
  --accent-glow: rgba(124, 90, 255, 0.3);
  --accent-hover: #9575ff;
  --accent-2: #ff5a7c;
  --accent-2-glow: rgba(255, 90, 124, 0.3);
  --verified-blue: #5ab4ff;
  --verified-gold: #ffd700;
  --verified-black: #e0e0e0;
  --success: #4ade80;
  --warning: #fbbf24;
  --danger: #f87171;
  --sidebar-width: 240px;
  --header-height: 58px;
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 30px rgba(124, 90, 255, 0.15);
  --transition: 0.2s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* Header */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-height);
  background: rgba(10, 10, 15, 0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  z-index: 1000;
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  box-shadow: 0 0 16px var(--accent-glow);
}

.logo-text {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text-primary);
}

.logo-text span { color: var(--accent); }

.header-search {
  flex: 1;
  max-width: 560px;
  margin: 0 auto;
  display: flex;
  gap: 0;
}

.search-input-wrap {
  flex: 1;
  position: relative;
}

.search-input {
  width: 100%;
  height: 40px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-right: none;
  border-radius: var(--radius) 0 0 var(--radius);
  color: var(--text-primary);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  padding: 0 16px;
  outline: none;
  transition: border-color var(--transition);
}

.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-muted); }

.search-btn {
  height: 40px;
  padding: 0 18px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-left: none;
  border-radius: 0 var(--radius) var(--radius) 0;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}

.search-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  border: none;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: white;
  box-shadow: 0 0 16px var(--accent-glow);
}
.btn-primary:hover { background: var(--accent-hover); box-shadow: 0 0 24px var(--accent-glow); }

.btn-secondary {
  background: var(--bg-hover);
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid transparent;
}
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }

.icon-btn {
  width: 38px; height: 38px;
  border-radius: var(--radius-sm);
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  transition: all var(--transition);
}
.icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

/* Sidebar */
.sidebar {
  position: fixed;
  top: var(--header-height);
  left: 0;
  width: var(--sidebar-width);
  height: calc(100vh - var(--header-height));
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-subtle);
  overflow-y: auto;
  padding: 12px 0;
  z-index: 100;
  transition: transform 0.3s ease;
}

.sidebar.hidden { transform: translateX(-100%); }

.sidebar-section { padding: 8px 0; }

.sidebar-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 6px 20px;
  margin-top: 4px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 20px;
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  border-radius: 0;
  position: relative;
}

.sidebar-item:hover { background: var(--bg-hover); color: var(--text-primary); }

.sidebar-item.active {
  background: rgba(124, 90, 255, 0.1);
  color: var(--accent);
}

.sidebar-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 4px; bottom: 4px;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}

.sidebar-item svg, .sidebar-item .icon { width: 20px; height: 20px; flex-shrink: 0; }

.sidebar-divider {
  height: 1px;
  background: var(--border-subtle);
  margin: 8px 12px;
}

/* Main Content Area */
.main {
  margin-left: var(--sidebar-width);
  margin-top: var(--header-height);
  min-height: calc(100vh - var(--header-height));
  padding: 24px;
}

/* Category Chips */
.category-bar {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 12px;
  margin-bottom: 24px;
  scrollbar-width: none;
}
.category-bar::-webkit-scrollbar { display: none; }

.chip {
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  transition: all var(--transition);
}

.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }

/* Video Grid */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

/* Video Card */
.video-card {
  cursor: pointer;
  transition: transform var(--transition);
}

.video-card:hover { transform: translateY(-2px); }

.video-thumb {
  position: relative;
  aspect-ratio: 16/9;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-card);
}

.video-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}

.video-card:hover .video-thumb img { transform: scale(1.04); }

.video-duration {
  position: absolute;
  bottom: 8px; right: 8px;
  background: rgba(0,0,0,0.85);
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  padding: 2px 6px;
  border-radius: 4px;
}

.video-play-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.3s ease;
}

.video-card:hover .video-play-overlay { background: rgba(0,0,0,0.3); }

.play-btn-overlay {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(124,90,255,0.9);
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transform: scale(0.8);
  transition: all 0.3s ease;
  box-shadow: 0 0 24px var(--accent-glow);
}

.video-card:hover .play-btn-overlay { opacity: 1; transform: scale(1); }

.video-info {
  display: flex;
  gap: 10px;
  padding: 10px 4px 4px;
}

.channel-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  background: var(--bg-card);
}

.channel-avatar img { width: 100%; height: 100%; object-fit: cover; }

.video-meta { flex: 1; min-width: 0; }

.video-title {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.4;
  color: var(--text-primary);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 4px;
}

.video-channel {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  color: var(--text-secondary);
  text-decoration: none;
  width: fit-content;
}

.video-channel:hover { color: var(--text-primary); }

.video-stats {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* Verified Badges */
.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px; height: 16px;
  border-radius: 50%;
  font-size: 9px;
  flex-shrink: 0;
}

.badge-verified { background: var(--verified-blue); color: #fff; }
.badge-gold { background: var(--verified-gold); color: #000; }
.badge-black { background: #111; color: var(--verified-black); border: 1px solid var(--verified-black); }

.badge-lg { width: 20px; height: 20px; font-size: 11px; }

/* Section Titles */
.section-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title .accent { color: var(--accent); }

/* Trending Rank Badge */
.trending-rank {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white;
  font-size: 12px;
  font-weight: 800;
  flex-shrink: 0;
}

/* Toast Notification */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  padding: 14px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 14px;
  z-index: 9999;
  box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 10px;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s ease;
  pointer-events: none;
}

.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { border-color: var(--success); }
.toast.error { border-color: var(--danger); }

/* Empty State */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; color: var(--text-secondary); margin-bottom: 8px; }
.empty-state p { font-size: 14px; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.mobile-open { transform: translateX(0); }
  .main { margin-left: 0; padding: 16px; }
  .header-search { max-width: 200px; }
  .logo-text { display: none; }
}

</style>

async function loadJSON(path) {
  if (path.includes('videos')) return JSON.parse(JSON.stringify(_VIDEOS_DATA));
  if (path.includes('channels')) return JSON.parse(JSON.stringify(_CHANNELS_DATA));
  if (path.includes('shorts')) return JSON.parse(JSON.stringify(_SHORTS_DATA));

// --- Verified Badge ---
function getBadgeHTML(channel, size = '') {
  const cls = `badge ${size}`;
  if (channel.IsBlackVerified) {
    return `<span class="${cls} badge-black" title="Official Creator">✓</span>`;
  }
  if (channel.IsGoldVerified) {
    return `<span class="${cls} badge-gold" title="Gold Verified">★</span>`;
  }
  if (channel.IsVerified) {
    return `<span class="${cls} badge-verified" title="Verified">✓</span>`;
  }
  return '';
}

// --- Format Numbers ---
function formatViews(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1).replace(/\.0$/, '') + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
  return n.toString();
}

// --- Video Card ---
function buildVideoCard(video, channel) {
  const card = document.createElement('div');
  card.className = 'video-card';
  card.innerHTML = `
    <div class="video-thumb">
      <img src="${video.thumbnail}" alt="${escapeHTML(video.title)}" loading="lazy">
      <div class="video-play-overlay">
        <div class="play-btn-overlay">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
      </div>
      <span class="video-duration">${video.duration}</span>
    </div>
    <div class="video-info">
      <div class="channel-avatar">
        <img src="${channel ? channel.avatar : ''}" alt="${channel ? channel.name : ''}" loading="lazy">
      </div>
      <div class="video-meta">
        <div class="video-title">${escapeHTML(video.title)}</div>
        <a class="video-channel" href="#">
          ${channel ? escapeHTML(channel.name) : 'Unknown'}
          ${channel ? getBadgeHTML(channel) : ''}
        </a>
        <div class="video-stats">${formatViews(video.views)} views &middot; ${video.uploadedAgo}</div>
      </div>
    </div>
  `;
  card.addEventListener('click', () => {
    window.location.href = `watch.html?v=${video.id}`;
  });
  return card;
}

// --- Escape HTML ---
function escapeHTML(str) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str || ''));
  return div.innerHTML;
}

// --- Toast ---
function showToast(msg, type = 'info') {
  let toast = document.getElementById('global-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'global-toast';
    toast.className = 'toast';
    document.body.appendChild(toast);
  }
  const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
  toast.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  toast.className = `toast ${type} show`;
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => { toast.classList.remove('show'); }, 3000);
}

// --- URL Params ---
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

// --- Sidebar toggle ---
function initSidebarToggle() {
  const toggle = document.getElementById('sidebar-toggle');
  const sidebar = document.querySelector('.sidebar');
  if (toggle && sidebar) {
    toggle.addEventListener('click', () => {
      if (window.innerWidth <= 768) {
        sidebar.classList.toggle('mobile-open');
      } else {
        sidebar.classList.toggle('hidden');
        const main = document.querySelector('.main');
        if (main) main.classList.toggle('no-sidebar');
      }
    });
  }
}

// --- Active Sidebar Link ---
function setActiveSidebarLink() {
  const page = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.sidebar-item[data-page]').forEach(el => {
    if (el.dataset.page === page) el.classList.add('active');
  });
}

// --- Init Search ---
function initSearch() {
  const input = document.querySelector('.search-input');
  const btn = document.querySelector('.search-btn');
  const doSearch = () => {
    const q = input?.value.trim();
    if (q) showToast(`Searching for "${q}"…`, 'info');
  };
  btn?.addEventListener('click', doSearch);
  input?.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
}

<script>
  let shorts = [], channels = [], currentIdx = 0;
  let isPlaying = true, progressTimer = null, shortProgress = 0;
  const SHORT_DURATION = 30; // seconds simulated

  async function init() {
    [shorts, channels] = await Promise.all([loadJSON('shorts.json'), loadJSON('channels.json')]);
    buildProgressBars();
    loadShort(0);
    startProgress();

    // Keyboard nav
    document.addEventListener('keydown', e => {
      if (e.code === 'ArrowDown' || e.code === 'ArrowRight') nextShort();
      if (e.code === 'ArrowUp' || e.code === 'ArrowLeft') prevShort();
      if (e.code === 'Space') { e.preventDefault(); toggleShortPlay(); }
    });

    // Touch swipe
    let touchStartY = 0;
    document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
    document.addEventListener('touchend', e => {
      const diff = touchStartY - e.changedTouches[0].clientY;
      if (Math.abs(diff) > 60) { if (diff > 0) nextShort(); else prevShort(); }
    });
  }

  function buildProgressBars() {
    const container = document.getElementById('short-progress-bars');
    container.innerHTML = '';
    shorts.forEach((_, i) => {
      const bar = document.createElement('div');
      bar.className = 'short-progress-bar';
      bar.id = `bar-${i}`;
      bar.innerHTML = `<div class="short-progress-fill" id="fill-${i}"></div>`;
      container.appendChild(bar);
    });
  }

  function loadShort(idx) {
    if (!shorts[idx]) return;
    currentIdx = idx;
    const s = shorts[idx];
    const ch = channels.find(c => c.id === s.channelId);

    document.getElementById('short-thumb').src = s.thumbnail;
    document.getElementById('short-title').textContent = s.title;
    document.getElementById('short-views').textContent = `${s.viewsFormatted} views · ${s.uploadedAgo}`;
    document.getElementById('short-like-count').textContent = formatViews(s.likes);
    document.getElementById('short-like-btn').classList.remove('liked');

    if (ch) {
      document.getElementById('short-ch-avatar').src = ch.avatar;
      document.getElementById('short-ch-name').innerHTML = escapeHTML(ch.name) + ' ' + getBadgeHTML(ch);
    }

    document.getElementById('prev-btn').disabled = idx === 0;
    document.getElementById('next-btn').disabled = idx === shorts.length - 1;

    // Reset progress bars
    shorts.forEach((_, i) => {
      const bar = document.getElementById(`bar-${i}`);
      const fill = document.getElementById(`fill-${i}`);
      bar.classList.remove('done', 'active');
      fill.style.width = '0%';
      if (i < idx) bar.classList.add('done');
      if (i === idx) bar.classList.add('active');
    });

    shortProgress = 0;
  }

  function startProgress() {
    clearInterval(progressTimer);
    progressTimer = setInterval(() => {
      if (!isPlaying) return;
      shortProgress += (100 / SHORT_DURATION) * 0.1;
      if (shortProgress >= 100) {
        shortProgress = 100;
        document.getElementById(`fill-${currentIdx}`).style.width = '100%';
        nextShort();
        return;
      }
      const fill = document.getElementById(`fill-${currentIdx}`);
      if (fill) fill.style.width = shortProgress + '%';
    }, 100);
  }

  function toggleShortPlay() {
    isPlaying = !isPlaying;
    document.getElementById('short-player').classList.toggle('paused', !isPlaying);
    showToast(isPlaying ? '' : 'Paused');
  }

  function nextShort(e) {
    if (e) e.stopPropagation();
    if (currentIdx < shorts.length - 1) {
      document.getElementById(`bar-${currentIdx}`).classList.add('done');
      document.getElementById(`fill-${currentIdx}`).style.width = '100%';
      loadShort(currentIdx + 1);
    } else {
      showToast('You\'ve reached the end of Shorts!', 'info');
    }
  }

  function prevShort(e) {
    if (e) e.stopPropagation();
    if (currentIdx > 0) loadShort(currentIdx - 1);
  }

  function toggleShortLike(e) {
    e.stopPropagation();
    const btn = document.getElementById('short-like-btn');
    const isLiked = btn.classList.toggle('liked');
    const base = shorts[currentIdx].likes;
    document.getElementById('short-like-count').textContent = formatViews(base + (isLiked ? 1 : 0));
    showToast(isLiked ? '❤️ Liked!' : 'Like removed', isLiked ? 'success' : 'info');
  }

  function toggleShortSub(e) {
    e.stopPropagation();
    const btn = document.getElementById('short-sub-btn');
    const isSub = btn.classList.toggle('subscribed');
    btn.textContent = isSub ? 'Following ✓' : 'Follow';
    showToast(isSub ? 'Following!' : 'Unfollowed', isSub ? 'success' : 'info');
  }

  init();
</script>
</body>
</html>
